name: Build SendPai Flutter

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libfuse2

      - name: Build Linux
        run: |
          cd Flutter
          flutter pub get
          flutter build linux --release

      - name: Build AppImage
        run: |
          curl -fsSL -o appimagetool https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

          mkdir -p SendPai.AppDir/usr/bin
          mkdir -p SendPai.AppDir/usr/share/icons/hicolor/512x512/apps
          cp -r Flutter/build/linux/x64/release/bundle/* SendPai.AppDir/usr/bin/
          cp Flutter/assets/icon.png SendPai.AppDir/sendpai.png
          cp Flutter/assets/icon.png SendPai.AppDir/usr/share/icons/hicolor/512x512/apps/sendpai.png
          cp Flutter/assets/icon.png SendPai.AppDir/usr/bin/sendpai-icon.png

          cat > SendPai.AppDir/sendpai.desktop << 'EOF'
          [Desktop Entry]
          Name=SendPai
          Comment=Dateien senden wie ein Senpai!
          Exec=sendpai
          Icon=sendpai
          Terminal=false
          Type=Application
          Categories=Network;FileTransfer;
          EOF

          cat > SendPai.AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          export APPDIR="$HERE"
          export LD_LIBRARY_PATH="$HERE/usr/bin/lib:$LD_LIBRARY_PATH"
          ICON_DIR="$HOME/.local/share/icons/hicolor/512x512/apps"
          mkdir -p "$ICON_DIR" 2>/dev/null
          cp "$HERE/sendpai.png" "$ICON_DIR/sendpai.png" 2>/dev/null
          exec "$HERE/usr/bin/sendpai" "$@"
          APPRUN
          chmod +x SendPai.AppDir/AppRun

          ARCH=x86_64 ./appimagetool SendPai.AppDir SendPai-x86_64.AppImage

      - name: Upload Linux
        uses: actions/upload-artifact@v4
        with:
          name: SendPai-Linux
          path: SendPai-x86_64.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'

      - name: Build Windows
        run: |
          cd Flutter
          flutter pub get
          flutter build windows --release

      - name: Package Windows
        run: |
          Compress-Archive -Path Flutter\build\windows\x64\runner\Release\* -DestinationPath SendPai-Windows.zip
        shell: pwsh

      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: SendPai-Windows
          path: SendPai-Windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'

      - name: Build macOS
        run: |
          cd Flutter
          flutter pub get
          flutter build macos --release

      - name: Package macOS
        run: |
          cd Flutter/build/macos/Build/Products/Release
          zip -r ../../../../../SendPai-macOS.zip sendpai.app || zip -r ../../../../../SendPai-macOS.zip SendPai.app || zip -r ../../../../../SendPai-macOS.zip *.app
          ls -la ../../../../../SendPai-macOS.zip

      - name: Upload macOS
        uses: actions/upload-artifact@v4
        with:
          name: SendPai-macOS
          path: Flutter/SendPai-macOS.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'

      - name: Build APK
        run: |
          cd Flutter
          flutter pub get
          flutter build apk --release

      - name: Upload Android
        uses: actions/upload-artifact@v4
        with:
          name: SendPai-Android
          path: Flutter/build/app/outputs/flutter-apk/app-release.apk

  release:
    needs: [build-linux, build-windows, build-macos, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Rename APK
        run: mv SendPai-Android/app-release.apk SendPai-Android/SendPai.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SendPai-Linux/SendPai-x86_64.AppImage
            SendPai-Windows/SendPai-Windows.zip
            SendPai-macOS/SendPai-macOS.zip
            SendPai-Android/SendPai.apk
          body: |
            ## 📤 SendPai v2.0.0 — Flutter Edition!

            **Dateien senden wie ein Senpai! Dein Gerät = Dein Server.**

            ### ⬇️ Downloads

            | Plattform | Datei | Anleitung |
            |-----------|-------|-----------|
            | 🐧 Linux | `SendPai-x86_64.AppImage` | Doppelklick! |
            | 🪟 Windows | `SendPai-Windows.zip` | Entpacken → sendpai.exe starten |
            | 🍎 macOS | `SendPai-macOS.zip` | Entpacken → SendPai.app starten |
            | 🤖 Android | `SendPai.apk` | Installieren + öffnen |

            ### ✨ Features
            - 📁 Dateien & Ordner per Link teilen
            - 🖱️ Echtes Drag & Drop
            - 🏠 Lokal (WLAN) sofort nutzbar
            - 🌐 Internet mit Port-Forwarding
            - 📦 ZIP mit eigenem Paketnamen
            - 🔒 Kein Cloud, kein Account, Peer-to-Peer
            - 🎨 Native Flutter UI, Dark Theme

            *Made with conviction, not capital.* 🦋
            *By [Shinpai-AI](https://shinpai.de)*
